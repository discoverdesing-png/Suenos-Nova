
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sueños-Nova by Pedro Simental Jacinto</title>
    <link rel="icon" href="/assets/logos/nova.png">
    <style>
        body { background: #0a0a0a; color: #fff; font-family: Arial; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: #1a1a1a; padding: 40px; border-radius: 10px; border: 1px solid #ff0044; box-shadow: 0 0 20px rgba(255,0,68,0.3); }
        h1 { color: #ff0044; text-align: center; margin-bottom: 30px; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #0a0a0a; border: 1px solid #ff0044; color: #fff; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #ff0044; border: none; color: #fff; font-weight: bold; cursor: pointer; border-radius: 5px; margin-top: 10px; }
        button:hover { background: #cc0036; }
        a { color: #ff0044; text-decoration: none; }
        p { text-align: center; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>INICIAR SESIÓN</h1>
        <form id="loginForm">
            <input type="text" placeholder="Usuario" id="usuario" required>
            <input type="password" placeholder="Contraseña" id="password" required>
            <button type="submit">ENTRAR</button>
        </form>
        <p>¿No tienes cuenta? <a href="/registro.html">Regístrate aquí</a></p>
    </div>
</body>
</html>
