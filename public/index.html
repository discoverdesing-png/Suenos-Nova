<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Sueños-Nova</title>
    <style>
        :root {
            --color-primario: #00bfff;
            --color-primario-hover: #0099cc;
            --color-primario-sombra: rgba(0, 191, 255, 0.3);
            --color-fondo: #0a0a12;
            --color-contenedor: #141420;
            --color-input: #0a0a12;
            --color-texto: #ffffff;
            --color-texto-secundario: #b0e0ff;
        }
        body { 
            background: var(--color-fondo); 
            color: var(--color-texto); 
            font-family: Arial, sans-serif; 
            margin: 0; 
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
     .container { 
            max-width: 450px; 
            width: 100%;
            background: var(--color-contenedor); 
            padding: 40px; 
            border-radius: 12px; 
            border: 1px solid var(--color-primario); 
            box-shadow: 0 0 25px var(--color-primario-sombra);
        }
        h1 { 
            color: var(--color-primario); 
            text-align: center; 
            margin-bottom: 5px;
            font-size: 32px;
            letter-spacing: 2px;
        }
     .subtitulo {
            color: var(--color-texto-secundario);
            text-align: center;
            font-size: 15px;
            margin-bottom: 30px;
        }
        input { 
            width: 100%; 
            padding: 13px; 
            margin: 8px 0; 
            background: var(--color-input); 
            border: 1px solid var(--color-primario); 
            color: var(--color-texto); 
            border-radius: 6px; 
            box-sizing: border-box;
            font-size: 15px;
        }
        input:focus {
            outline: none;
            border: 1px solid var(--color-primario-hover);
            box-shadow: 0 0 8px var(--color-primario-sombra);
        }
        label {
            display: block;
            margin-top: 18px;
            color: var(--color-primario);
            font-size: 14px;
            font-weight: bold;
        }
        button { 
            width: 100%; 
            padding: 15px; 
            background: var(--color-primario); 
            border: none; 
            color: #0a0a12; 
            font-weight: bold; 
            cursor: pointer; 
            border-radius: 6px; 
            margin-top: 25px;
            font-size: 16px;
            letter-spacing: 1px;
        }
        button:hover { 
            background: var(--color-primario-hover); 
            box-shadow: 0 0 15px var(--color-primario-sombra);
        }
        button:disabled {
            background: #555;
            color: #999;
            cursor: not-allowed;
        }
     .error {
            color: #ff5577;
            text-align: center;
            margin-top: 12px;
            font-size: 14px;
            min-height: 20px;
        }
        a { color: var(--color-primario); text-decoration: none; }
     .registro-link { text-align: center; margin-top: 25px; color: var(--color-texto-secundario); }
    </style>
</head>
<body>
    <div class="container">
        <h1>SUEÑOS-NOVA</h1>
        <div class="subtitulo">by Pedro Simental Jacinto</div>
        
        <form id="loginForm">
            <label>Usuario o Email</label>
            <input type="text" id="usuario" placeholder="Tu usuario o email" required>
            
            <label>Contraseña</label>
            <input type="password" id="password" placeholder="Tu contraseña" required>
            
            <div class="error" id="errorMsg"></div>
            <button type="submit" id="btnLogin">ENTRAR</button>
        </form>
        
        <div class="registro-link">
            ¿No tienes cuenta? <a href="/registro.html">Regístrate aquí</a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnLogin');
            const errorMsg = document.getElementById('errorMsg');
            
            btn.disabled = true;
            btn.textContent = 'ENTRANDO...';
            errorMsg.textContent = '';

            const data = {
                usuario: document.getElementById('usuario').value.trim(),
                password: document.getElementById('password').value
            };

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });

                const result = await res.json();
                
                if (res.ok) {
                    localStorage.setItem('userId', result.userId);
                    localStorage.setItem('token', result.token);
                    localStorage.setItem('themeColor', result.theme_color || '#00bfff');
                    window.location.href = '/perfil.html';
                } else {
                    errorMsg.textContent = result.error || 'Usuario o contraseña incorrectos';
                    btn.disabled = false;
                    btn.textContent = 'ENTRAR';
                }
            } catch (err) {
                errorMsg.textContent = 'Error de conexión con el servidor';
                btn.disabled = false;
                btn.textContent = 'ENTRAR';
            }
        });
    </script>
</body>
</html>
